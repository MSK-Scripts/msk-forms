packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 no longer runs dependency build scripts by default (supply-chain
# protection). Explicitly allow the trusted ones we rely on.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true

# Security overrides for transitive dependencies (moved here because pnpm no
# longer reads the "pnpm" field in package.json).
overrides:
  "esbuild@<0.28.1": ">=0.28.1"
  "postcss@<8.5.10": ">=8.5.10"
  "undici@<6.27.0": "^6.27.0"
  # GHSA-92pp-h63x-v22m — serveStatic middleware bypass via repeated slashes
  # (transitive via prisma -> @prisma/dev). Dev-only, but kept patched.
  "@hono/node-server@<1.19.13": ">=1.19.13 <2"
