name: 🐛 Bug Report
description: Report a bug so we can fix it
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the bug report! Please fill in the fields as completely as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
      placeholder: A clear and concise description of the bug …
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can the bug be reproduced?
      value: |
        1. Go to '…'
        2. Click on '…'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web (dashboard / builder)
        - Public form / status page
        - Discord bot
        - Realtime
        - Database / Prisma
        - CI/CD / build
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, etc.
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 130
        - Node: 22.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant console/server logs or screenshots.
      render: shell
    validations:
      required: false
