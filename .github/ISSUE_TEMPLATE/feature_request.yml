name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does the feature solve? What is the use case?
      placeholder: "As a <role> I want <goal> so that <benefit> …"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: How should the feature work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Form builder
        - Dashboard
        - Feedback loop / status
        - Discord bot
        - Branding / i18n
        - Integrations / API
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Which alternatives did you consider?
    validations:
      required: false
