# Dependabot — automatische Dependency-Updates für MSK Forms
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # --- npm / pnpm (Monorepo-Root) -----------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Patch/Minor gebündelt, um PR-Flut zu vermeiden
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Next.js / React separat halten (Major-relevant)
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@next/*"
    ignore:
      # Major-Bumps von Next.js bewusst manuell durchführen
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions ------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"

  # --- Docker (docker-compose / Dev-Images) --------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - "docker"
    commit-message:
      prefix: "chore(docker)"
