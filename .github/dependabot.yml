# Dependabot — automated dependency updates for MSK Forms
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # --- npm / pnpm (monorepo root) -----------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Bundle patch/minor updates to avoid a flood of PRs
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Keep Next.js / React separate (major-relevant)
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@next/*"
    ignore:
      # Do Next.js major bumps manually
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Stay on Tailwind CSS v3 on purpose: the branding system depends on the
      # v3 HSL token format, so a v4 major must be a deliberate migration.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # TypeScript majors are a deliberate migration: TS 7 (the native compiler)
      # is not yet supported by our toolchain (typescript-eslint 8 crashes on it).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions ------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"

  # --- Docker (docker-compose / dev images) --------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - "docker"
    commit-message:
      prefix: "chore(docker)"
