# Local dev infrastructure for MSK Forms: Postgres, Redis, MinIO.
# Start: docker compose up -d
services:
  postgres:
    image: postgres:16
    container_name: msk-forms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: msk
      POSTGRES_PASSWORD: msk
      POSTGRES_DB: msk_forms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: msk-forms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: msk-forms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: msk
      MINIO_ROOT_PASSWORD: msk-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
